{% load app_i18n %}

<div class="sidebar-footer">
    {% include 'app/includes/sidebar_social_links.html' %}

    <div class="sidebar-user-card">
        <div class="sidebar-user-meta">
            <strong>{{ request.user.username }}</strong>
            <span>{{ request.user.email|default:'--' }}</span>
        </div>

        <form action="{% url 'app:logout' %}" method="post" class="logout-form">
            {% csrf_token %}
            <button type="submit" class="danger-button button-block" data-loading-text="{% tr 'common.logout_loading' 'Deconnexion...' %}">{% tr 'common.logout' 'Se deconnecter' %}</button>
        </form>
    </div>
</div>
