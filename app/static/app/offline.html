<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#c8f800">
    <title>ZEN TRADING hors ligne</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #080b12;
            --text: #edf2ff;
            --muted: #b8c1d6;
            --accent: #c8f800;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: linear-gradient(180deg, #070a11 0%, #0a0f17 100%);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            display: grid;
            gap: 14px;
            width: min(460px, 100%);
            text-align: center;
        }

        img {
            width: 74px;
            height: 74px;
            margin: 0 auto 8px;
            border-radius: 18px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.55rem, 4vw, 2rem);
            line-height: 1.15;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.55;
        }

        a {
            justify-self: center;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            padding: 0 18px;
            border-radius: 12px;
            background: var(--accent);
            color: #10140a;
            font-weight: 800;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main>
        <img src="/static/app/favicon.png" alt="">
        <h1>Connexion indisponible</h1>
        <p>ZEN TRADING est installe, mais cette page a besoin d'une connexion pour charger vos donnees.</p>
        <a href="/dashboard/">Reessayer</a>
    </main>
</body>
</html>
