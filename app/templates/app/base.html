{% load static app_i18n %}
<!DOCTYPE html>
<html lang="{{ app_language }}" dir="{{ app_language_direction }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ZEN TRADING{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}{% tr 'brand.meta_description' 'ZEN TRADING est une plateforme de journal de trading pour piloter vos comptes, votre capital et vos performances depuis un espace unique.' %}{% endblock %}">
    <meta name="theme-color" content="#c8f800">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ZEN TRADING">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="{% static 'app/manifest.webmanifest' %}?v={{ app_static_version }}">
    <link rel="icon" type="image/png" href="{% static 'app/favicon.png' %}">
    <link rel="shortcut icon" type="image/png" href="{% static 'app/favicon.png' %}">
    <link rel="apple-touch-icon" href="{% static 'app/favicon.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'app/dashboard.css' %}?v={{ app_static_version }}">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}" data-ui-locale="{{ app_language_locale }}">
    {% block content %}{% endblock %}
    <script src="{% static 'app/ui.js' %}?v={{ app_static_version }}" defer></script>
    <script src="{% static 'app/pwa.js' %}?v={{ app_static_version }}" defer></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
